runConfig:
  minInstances: 1
  maxInstances: 100
  concurrency: 80
  cpu: 2
  memoryMiB: 1024

env:
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: studio-9029052952-9df3f.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_SHEET_ID
    secret: GOOGLE_SHEET_ID
    availability:
      - RUNTIME
  - variable: GOOGLE_SHEETS_CREDENTIALS
    secret: GOOGLE_SHEETS_CREDENTIALS
    availability:
      - RUNTIME